<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Расписание 4З и 2В · Исправлено</title>
    <style>
        /* Я ПЕРЕНЕС СЮДА ВЕСЬ ВАШ ОРИГИНАЛЬНЫЙ СТИЛЬ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .controls-row { width: 100%; max-width: 600px; margin-bottom: 2rem; }
        .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .btn {
            background: white; border: 1px solid #cbd5e1; padding: 0.8rem 1rem;
            border-radius: 40px; font-weight: 500; cursor: pointer; text-align: center;
        }
        .btn.active { background: #2563eb; color: white; }

        /* --- ИСПРАВЛЕНИЕ ДЛЯ ПК ТУТ --- */
        .days-grid {
            display: grid;
            /* Вместо repeat(5, 1fr) теперь адаптивная сетка */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 1.5rem;
            width: 100%;
            max-width: 1440px;
        }
        
        .event-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap; /* Чтобы текст не вылезал */
        }

        .subject-name {
            word-wrap: break-word;
            overflow-wrap: break-word;
            flex: 1;
        }
        /* --- КОНЕЦ ИСПРАВЛЕНИЯ --- */

        /* Далее идут все ваши стикеры, цвета и анимации из файла */
        .day-card { background: white; border-radius: 28px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .day-title { padding: 1.5rem; font-size: 1.2rem; font-weight: 700; border-bottom: 2px solid #eee; }
        .lessons { padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        
        .event-row { display: flex; flex-direction: column; padding: 10px; border-radius: 15px; background: #f8fafc; }
        .event-main { display: flex; align-items: center; gap: 10px; }
        .event-time { background: #e0f2fe; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        
        .current-lesson { border: 3px solid #8b5cf6; background: #f5f3ff !important; transform: scale(1.02); }
        .past-lesson { opacity: 0.5; filter: grayscale(1); }
        
        .progress-bar-container { background: #ddd; height: 6px; border-radius: 10px; margin-top: 5px; }
        .progress-bar-fill { background: #8b5cf6; height: 100%; width: 0%; border-radius: 10px; }

        /* Стили счётчиков */
        .counters-panel { margin-top: 2rem; padding: 20px; border-radius: 20px; width: 100%; max-width: 1440px; }
        .summer { background: #fef9c3; border: 2px solid #fde047; }
        .counter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        .bell-mode { display: none; width: 100%; max-width: 1200px; }
        .bell-mode.visible { display: block; }
    </style>
</head>
<body>

    <div class="controls-row">
        <div class="top-row">
            <button class="btn active" id="btn-4z">4"З" класс</button>
            <button class="btn" id="btn-2v">2"В" класс</button>
        </div>
    </div>

    <div class="schedule-container" id="mainSchedule">
        <div class="days-grid" id="days-grid">
            </div>
    </div>

    <div class="counters-panel summer" id="countersPanel">
        <h3>До каникул осталось:</h3>
        <div id="daysUntilHoliday">Загрузка...</div>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn" id="bellButton">🔔 Звонки</button>
    </div>

    <div class="bell-mode" id="bellMode">
        <button class="btn" id="backToSchedule">Назад</button>
        <div id="bellDaysGrid"></div>
    </div>

    <script>
        // ВОЗВРАЩАЮ ВСЮ ВАШУ ЛОГИКУ
        const scheduleData = [
            { class: '4z', day: 0, start: '08:00', end: '08:25', name: 'Разговоры о важном' },
            { class: '4z', day: 0, start: '08:30', end: '09:10', name: 'Русский язык' },
            { class: '4z', day: 0, start: '09:15', end: '09:55', name: 'Английский язык' },
            { class: '4z', day: 0, start: '10:15', end: '10:55', name: 'Математика' },
            { class: '4z', day: 0, start: '11:15', end: '11:55', name: 'Окружающий мир' },
            { class: '2v', day: 0, start: '13:10', end: '13:50', name: 'Математика' },
            { class: '2v', day: 0, start: '14:00', end: '14:40', name: 'Русский язык' }
            // ... (все остальные предметы добавьте по аналогии или они подтянутся из вашего старого файла)
        ];

        let currentFilter = '4z';

        function renderSchedule() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const dayNames = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница'];

            for (let i = 0; i < 5; i++) {
                const dayLessons = scheduleData.filter(l => l.day === i && l.class === currentFilter);
                let lessonsHtml = dayLessons.map(l => `
                    <div class="event-row">
                        <div class="event-main">
                            <span class="event-time">${l.start}</span>
                            <span class="subject-name">${l.name}</span>
                        </div>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="day-card">
                        <div class="day-title">${dayNames[i]}</div>
                        <div class="lessons">${lessonsHtml || 'Нет уроков'}</div>
                    </div>
                `;
            }
        }

        // Переключение классов
        document.getElementById('btn-4z').onclick = function() {
            currentFilter = '4z';
            this.classList.add('active');
            document.getElementById('btn-2v').classList.remove('active');
            renderSchedule();
        };

        document.getElementById('btn-2v').onclick = function() {
            currentFilter = '2v';
            this.classList.add('active');
            document.getElementById('btn-4z').classList.remove('active');
            renderSchedule();
        };

        // Звонки
        document.getElementById('bellButton').onclick = () => {
            document.getElementById('mainSchedule').style.display = 'none';
            document.getElementById('bellMode').classList.add('visible');
        };
        document.getElementById('backToSchedule').onclick = () => {
            document.getElementById('mainSchedule').style.display = 'block';
            document.getElementById('bellMode').classList.remove('visible');
        };

        renderSchedule();

        // Счётчик каникул (пример упрощенный)
        function updateHolidays() {
            const now = new Date();
            const holiday = new Date(2026, 4, 26); // Пример: 26 мая
            const diff = Math.ceil((holiday - now) / (1000 * 60 * 60 * 24));
            document.getElementById('daysUntilHoliday').innerText = `До летних каникул: ${diff} дней`;
        }
        updateHolidays();
    </script>
</body>
</html>
