<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Расписание 4З и 2В · финальная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #0b1e33;
        }

        /* Верхние кнопки: две кнопки рядом */
        .controls-row {
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 0.8rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            color: #1e3c72;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 8px 18px rgba(37,99,235,0.2);
        }

        .btn:hover {
            background: #e2e8f0;
        }

        .btn.active:hover {
            background: #1d4ed8;
        }

        .btn.bell {
            background: #f59e0b;
            color: white;
            border-color: #f59e0b;
            box-shadow: 0 8px 18px rgba(245,158,11,0.3);
        }
        .btn.bell:hover {
            background: #d97706;
        }

        .btn.back {
            background: #64748b;
            color: white;
            border-color: #64748b;
        }

        .message-panel {
            background: linear-gradient(135deg, #a7f3d0, #6ee7b7);
            border-radius: 60px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            animation: bounce-message 2s infinite;
            border: 2px solid #34d399;
            width: fit-content;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .message-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #065f46;
        }

        .message-icon {
            font-size: 2rem;
            animation: spin 3s infinite linear;
        }

        @keyframes bounce-message {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .schedule-container {
            max-width: 1440px;
            width: 100%;
        }

        /* ИСПРАВЛЕННАЯ СЕТКА ДЛЯ ПК */
        .days-grid {
            display: grid;
            /* Автоматически определяет кол-во колонок в зависимости от ширины экрана */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 1.5rem;
        }

        .day-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0, 20, 40, 0.15), 0 1px 3px rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            overflow: visible;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .day-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 28px 40px -12px rgba(0, 40, 80, 0.2);
        }

        .day-title {
            padding: 1.4rem 1.2rem 0.8rem 1.2rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b2b4a;
            border-bottom: 3px solid #e2e8f0;
            margin: 0 1rem 0.5rem 1rem;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .day-title span {
            background: #e6f0ff;
            color: #2563eb;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            margin-left: auto;
        }

        .lessons {
            padding: 0.8rem 1.2rem 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .event-row {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 0.7rem;
            border-radius: 12px;
            transition: background 0.1s, opacity 0.2s, box-shadow 0.2s, border 0.2s;
        }

        .event-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .event-main {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .event-time {
            background: #f1f9ff;
            color: #0369a1;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            white-space: nowrap;
            border: 1px solid #b9d9f0;
            min-width: 88px;
            text-align: center;
            letter-spacing: -0.01em;
            margin-left: 0.5rem;
            background-color: white;
        }

        .event-time::before {
            content: "🕘";
            margin-right: 4px;
            font-size: 0.75rem;
            opacity: 0.7;
            display: inline-block;
            transform: translateY(-1px);
        }

        .event-name {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.4;
            flex-wrap: nowrap;
        }

        .class-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            background: #e0e7ff;
            color: #1e3c72;
            border: 1px solid #a5b4fc;
            width: 42px;
            text-align: center;
            flex-shrink: 0;
        }

        .class-badge.class-2v {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }

        .subject-name {
            flex: 1 1 auto;
            white-space: normal;
            word-break: break-word;
            min-width: 0;
        }

        .canteen-indicator {
            font-size: 0.9rem;
            opacity: 0.9;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
            transition: transform 0.2s;
            color: #b91c1c;
            width: 32px;
            flex-shrink: 0;
            justify-content: flex-start;
        }
        .canteen-indicator:hover {
            transform: scale(1.2);
            opacity: 1;
        }

        .event-row.green-lesson {
            background-color: #d9f0d9;
        }

        .event-row.orange-lesson {
            background-color: #ffecb3;
        }

        .event-row.past-lesson {
            opacity: 0.45;
            filter: grayscale(0.6);
            transition: opacity 0.2s;
        }

        .event-row.current-lesson {
            background: rgba(139, 92, 246, 0.15) !important;
            border: 4px solid #8b5cf6 !important;
            box-shadow: 0 0 30px #8b5cf6, inset 0 0 10px rgba(139, 92, 246, 0.3);
            transform: scale(1.02);
            z-index: 10;
            font-weight: 600;
            transition: all 0.2s;
        }

        .event-row.break-row {
            background: #fff3cd;
            border-left: 8px solid #fbbf24;
            animation: pulse-break 2s infinite;
            margin: 0.5rem 0;
            border-radius: 16px;
        }

        .event-row.canteen-row {
            background: #fee2e2;
            border-left: 8px solid #ef4444;
            animation: pulse-canteen 2s infinite;
            margin: 0.5rem 0;
            border-radius: 16px;
        }

        .event-row.window-row {
            background: #e0f2fe;
            border-left: 8px solid #38bdf8;
            animation: pulse-window 2s infinite;
            margin: 0.5rem 0;
            border-radius: 16px;
        }

        .event-row.reminder-row {
            background: #fef9c3;
            border-left: 8px solid #eab308;
            animation: pulse-reminder 2s infinite;
            margin: 0.5rem 0;
            border-radius: 16px;
        }

        .event-row.meeting-row {
            background: #ddd6fe;
            border-left: 8px solid #8b5cf6;
            animation: pulse-meeting 2s infinite;
            margin: 0.5rem 0;
            border-radius: 16px;
        }

        @keyframes pulse-window {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        @keyframes pulse-reminder {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }

        @keyframes pulse-meeting {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }

        .break-icon, .canteen-icon, .window-icon, .reminder-icon, .meeting-icon {
            font-size: 1.2rem;
            animation: bounce 1s infinite;
            display: inline-block;
        }

        .canteen-icon {
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .event-progress {
            margin-top: 0.5rem;
            margin-left: calc(88px + 1.5rem);
            display: none;
            flex-direction: column;
            gap: 0.2rem;
        }

        .progress-bar-container {
            background: #edf2f7;
            height: 8px;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            width: 0%;
            transition: width 0.3s ease;
        }

        .break-row .progress-bar-fill {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        .canteen-row .progress-bar-fill {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        .window-row .progress-bar-fill {
            background: linear-gradient(90deg, #38bdf8, #7dd3fc);
        }

        .reminder-row .progress-bar-fill {
            background: linear-gradient(90deg, #eab308, #fde047);
        }

        .meeting-row .progress-bar-fill {
            background: linear-gradient(90deg, #8b5cf6, #c4b5fd);
        }

        .time-remaining-small {
            font-size: 0.8rem;
            color: #2563eb;
            font-weight: 500;
        }

        .break-row .time-remaining-small {
            color: #b45309;
        }

        .canteen-row .time-remaining-small {
            color: #b91c1c;
        }

        .window-row .time-remaining-small {
            color: #0369a1;
        }

        .reminder-row .time-remaining-small {
            color: #854d0e;
        }

        .meeting-row .time-remaining-small {
            color: #5b21b6;
        }

        .day-card:nth-child(1) .day-title { border-bottom-color: #3b82f6; }
        .day-card:nth-child(2) .day-title { border-bottom-color: #10b981; }
        .day-card:nth-child(3) .day-title { border-bottom-color: #f59e0b; }
        .day-card:nth-child(4) .day-title { border-bottom-color: #ef4444; }
        .day-card:nth-child(5) .day-title { border-bottom-color: #8b5cf6; }

        /* Стили для счётчиков каникул */
        .counters-panel {
            margin-top: 3rem;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 1440px;
            transition: all 0.5s;
        }

        .counters-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border-left: 6px solid;
            padding-left: 1rem;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .counters-title span {
            font-size: 2.5rem;
            animation: wave 2s infinite;
        }

        @keyframes wave {
            0%,100%{ transform: rotate(0deg); }
            25%{ transform: rotate(10deg); }
            75%{ transform: rotate(-10deg); }
        }

        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .counter-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid;
            transition: transform 0.2s;
        }

        .counter-card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .counter-label {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .counter-value {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            animation: pulseNumber 1s infinite;
        }

        @keyframes pulseNumber {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .counter-progress {
            height: 16px;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
        }

        .counter-progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .counter-note {
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .counter-note .emoji-big {
            font-size: 1.5rem;
            animation: spin-slow 5s infinite linear;
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .autumn {
            background: linear-gradient(135deg, #fef08a, #fdba74, #fb923c);
            border: 2px solid #ea580c;
            box-shadow: 0 20px 35px -10px #ea580c;
        }
        .autumn .counters-title {
            color: #7a2e0e;
            border-left-color: #c2410c;
        }
        .autumn .counter-card {
            border-color: #f97316;
        }
        .autumn .counter-value {
            color: #b45309;
        }
        .autumn .counter-progress {
            background: #fed7aa;
        }
        .autumn .counter-progress-fill {
            background: linear-gradient(90deg, #f97316, #f59e0b);
        }

        .winter {
            background: linear-gradient(135deg, #bae6fd, #a5f3fc, #7dd3fc);
            border: 2px solid #0284c7;
            box-shadow: 0 20px 35px -10px #0284c7;
        }
        .winter .counters-title {
            color: #075985;
            border-left-color: #0369a1;
        }
        .winter .counter-card {
            border-color: #38bdf8;
        }
        .winter .counter-value {
            color: #0c4a6e;
        }
        .winter .counter-progress {
            background: #b0e0ff;
        }
        .winter .counter-progress-fill {
            background: linear-gradient(90deg, #0284c7, #38bdf8);
        }

        .spring {
            background: linear-gradient(135deg, #fbc9d1, #fda4af, #fb7185);
            border: 2px solid #f43f5e;
            box-shadow: 0 20px 35px -10px #f43f5e;
        }
        .spring .counters-title {
            color: #9d174d;
            border-left-color: #db2777;
        }
        .spring .counter-card {
            border-color: #f472b6;
        }
        .spring .counter-value {
            color: #be185d;
        }
        .spring .counter-progress {
            background: #fecdd3;
        }
        .spring .counter-progress-fill {
            background: linear-gradient(90deg, #f43f5e, #fb7185);
        }

        .summer {
            background: linear-gradient(135deg, #fef9c3, #fde68a, #fcd34d);
            border: 2px solid #fbbf24;
            box-shadow: 0 20px 35px -10px #fbbf24;
            animation: summerGlow 3s infinite alternate;
        }
        @keyframes summerGlow {
            from { box-shadow: 0 20px 35px -10px #fbbf24; }
            to { box-shadow: 0 20px 45px -5px #f97316; }
        }
        .summer .counters-title {
            color: #b45309;
            border-left-color: #ea580c;
        }
        .summer .counter-card {
            border-color: #f59e0b;
        }
        .summer .counter-value {
            color: #ea580c;
        }
        .summer .counter-progress {
            background: #fde68a;
        }
        .summer .counter-progress-fill {
            background: linear-gradient(90deg, #fbbf24, #f97316, #f59e0b);
        }

        /* Кнопки скачивания */
        .print-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .print-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 18px rgba(37,99,235,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
            text-align: center;
            min-width: 200px;
        }

        .print-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .print-btn.secondary {
            background: #10b981;
            box-shadow: 0 8px 18px rgba(16,185,129,0.3);
        }
        .print-btn.secondary:hover {
            background: #059669;
        }

        .print-btn.tertiary {
            background: #8b5cf6;
            box-shadow: 0 8px 18px rgba(139,92,246,0.3);
        }
        .print-btn.tertiary:hover {
            background: #7c3aed;
        }

        .print-btn.bell {
            background: #f59e0b;
            box-shadow: 0 8px 18px rgba(245,158,11,0.3);
        }
        .print-btn.bell:hover {
            background: #d97706;
        }

        .bell-button-container {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        /* Режим расписания звонков */
        .bell-mode {
            display: none;
            width: 100%;
            max-width: 1440px;
            margin-top: 2rem;
        }

        .bell-mode.visible {
            display: block;
        }

        .bell-mode h2 {
            font-size: 2.2rem;
            color: #0b2b4a;
            margin-bottom: 1.5rem;
            border-left: 6px solid #f59e0b;
            padding-left: 1rem;
            text-shadow: 1px 1px 0 #ffe0b0;
        }

        /* ИСПРАВЛЕННАЯ СЕТКА ЗВОНКОВ ДЛЯ ПК */
        .bell-days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .bell-day-card {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border-radius: 28px;
            padding: 1.2rem;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
            border: 2px solid #f59e0b;
            transition: transform 0.2s;
        }

        .bell-day-card:hover {
            transform: translateY(-5px);
        }

        .bell-day-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e3c72;
            text-align: center;
            margin-bottom: 1rem;
            border-bottom: 3px solid #f59e0b;
            padding-bottom: 0.5rem;
        }

        .bell-event-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #cbd5e1;
            font-size: 0.95rem;
        }
        .bell-event-item:last-child {
            border-bottom: none;
        }
        .bell-time {
            font-weight: 600;
            color: #2563eb;
            min-width: 4.5rem;
        }
        .bell-type {
            color: #1e293b;
            flex: 1;
        }
        .bell-type i {
            font-style: normal;
            background: #f1f5f9;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .shift-divider {
            margin: 0.5rem 0;
            border-top: 2px dashed #f59e0b;
            text-align: center;
            font-size: 0.8rem;
            color: #b45309;
            letter-spacing: 1px;
            position: relative;
        }
        .shift-divider::before {
            content: "⏬ вторая смена ⏬";
            background: #fef9c3;
            padding: 0 0.5rem;
            position: relative;
            top: -0.7rem;
            border-radius: 20px;
            color: #b45309;
            font-weight: 600;
        }

        .no-lessons {
            text-align: center;
            padding: 1rem;
            color: #64748b;
            font-style: italic;
        }

        .shift-separator {
            margin: 0.5rem 0 1rem 0;
            border-top: 2px dashed #94a3b8;
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            letter-spacing: 1px;
        }
        .shift-separator::before {
            content: "⏬ вторая смена ⏬";
            background: #f1f5f9;
            padding: 0 0.5rem;
            position: relative;
            top: -0.7rem;
        }

        /* Счётчик баллов для классов */
        .score-counter {
            margin: 2rem auto 0;
            max-width: 400px;
            background: #fff9e6;
            border-radius: 40px;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #fbbf24;
            display: none;
            text-align: center;
            transition: transform 0.2s;
        }
        .score-counter.visible {
            display: block;
        }
        .score-counter:hover {
            transform: scale(1.02);
        }
        .score-header {
            font-size: 1.8rem;
            font-weight: 600;
            color: #b45309;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .score-header span {
            font-size: 2rem;
            animation: bounce 1s infinite;
        }
        .score-value {
            font-size: 4rem;
            font-weight: 800;
            color: #2563eb;
            margin: 0.5rem 0;
            text-shadow: 2px 2px 0 #fde68a;
        }
        .score-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .score-btn {
            background: #f59e0b;
            border: none;
            color: white;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 0 #b45309;
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .score-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #b45309;
        }
        .score-input {
            width: 80px;
            height: 60px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            border: 2px solid #f59e0b;
            border-radius: 20px;
            color: #2563eb;
            background: white;
        }
        .score-reset {
            background: #94a3b8;
            font-size: 1.2rem;
            padding: 0 1.5rem;
            border-radius: 30px;
            height: 50px;
            box-shadow: 0 5px 0 #475569;
        }

        /* Мобильные адаптации */
        @media (max-width: 700px) {
            .top-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .days-grid, .bell-days-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
    <div class="controls-row" id="mainControls">
        <div class="top-row">
            <button class="btn" id="btn-4z">4"З" класс</button>
            <button class="btn" id="btn-2v">2"В" класс</button>
        </div>
    </div>

    <div class="message-panel" id="messagePanel" style="display: none;">
        <div class="message-content">
            <span class="message-icon">🎉</span>
            <span class="message-text" id="messageText"></span>
            <span class="message-icon">🎉</span>
        </div>
    </div>

    <div class="schedule-container" id="mainSchedule">
        <div class="days-grid" id="days-grid">
            <div class="day-card" data-day="0">
                <div class="day-title">Понедельник <span id="count-monday">0</span></div>
                <div class="lessons" id="lessons-0"></div>
            </div>
            <div class="day-card" data-day="1">
                <div class="day-title">Вторник <span id="count-tuesday">0</span></div>
                <div class="lessons" id="lessons-1"></div>
            </div>
            <div class="day-card" data-day="2">
                <div class="day-title">Среда <span id="count-wednesday">0</span></div>
                <div class="lessons" id="lessons-2"></div>
            </div>
            <div class="day-card" data-day="3">
                <div class="day-title">Четверг <span id="count-thursday">0</span></div>
                <div class="lessons" id="lessons-3"></div>
            </div>
            <div class="day-card" data-day="4">
                <div class="day-title">Пятница <span id="count-friday">0</span></div>
                <div class="lessons" id="lessons-4"></div>
            </div>
        </div>
    </div>

    <div class="counters-panel summer" id="countersPanel">
        <div class="counters-title">
            <span>🌞</span> До каникул осталось... <span>🍉</span>
        </div>
        <div class="counters-grid">
            <div class="counter-card">
                <div class="counter-label"><span>🏖️</span> Ближайшие каникулы</div>
                <div class="counter-value" id="nextHolidayName">...</div>
                <div class="counter-note" id="nextHolidayDates"></div>
                <div class="counter-progress">
                    <div class="counter-progress-fill" id="holidayProgress" style="width: 0%;"></div>
                </div>
                <div class="counter-note" id="daysUntilHoliday"><span class="emoji-big">⏳</span></div>
            </div>
            <div class="counter-card">
                <div class="counter-label"><span>📆</span> Понедельников до конца года</div>
                <div class="counter-value" id="mondaysLeft">...</div>
                <div class="counter-progress">
                    <div class="counter-progress-fill" id="yearProgress" style="width: 0%;"></div>
                </div>
                <div class="counter-note" id="yearDates"><span class="emoji-big">🗓️</span> с 1 сентября 2025 по 26 мая 2026</div>
            </div>
        </div>
    </div>

    <div class="print-buttons" id="printButtons">
        <button class="print-btn secondary" id="print4z">Скачать расписание 4З</button>
        <button class="print-btn tertiary" id="print2v">Скачать расписание 2В</button>
    </div>

    <div id="score4z" class="score-counter">
        <div class="score-header"><span>🐻</span> 4"З" класс <span>🌟</span></div>
        <div class="score-value" id="score4zValue">0</div>
        <div class="score-controls">
            <button class="score-btn" id="score4zMinus">-</button>
            <input type="number" id="score4zInput" class="score-input" value="0" min="0" step="1">
            <button class="score-btn" id="score4zPlus">+</button>
            <button class="score-btn score-reset" id="score4zReset">сброс</button>
        </div>
    </div>

    <div id="score2v" class="score-counter">
        <div class="score-header"><span>🐼</span> 2"В" класс <span>✨</span></div>
        <div class="score-value" id="score2vValue">0</div>
        <div class="score-controls">
            <button class="score-btn" id="score2vMinus">-</button>
            <input type="number" id="score2vInput" class="score-input" value="0" min="0" step="1">
            <button class="score-btn" id="score2vPlus">+</button>
            <button class="score-btn score-reset" id="score2vReset">сброс</button>
        </div>
    </div>

    <div class="bell-button-container">
        <button class="btn bell" id="bellButton">🔔 Расписание звонков</button>
    </div>

    <div class="bell-mode" id="bellMode">
        <h2>🔔 Расписание звонков</h2>
        <div class="bell-days-grid" id="bellDaysGrid"></div>
        <div class="back-button" style="display: flex; justify-content: center; margin-top: 2rem;">
            <button class="btn back" id="backToSchedule">← Назад к расписанию</button>
        </div>
    </div>

    <script>
        // ==================== ДАННЫЕ РАСПИСАНИЯ ====================
        const scheduleData = [

            { class: '4z', day: 0, start: '08:00', end: '08:25', name: 'Разговоры о важном' },
            { class: '4z', day: 0, start: '08:30', end: '09:10', name: 'Русский язык' },

            { class: '4z', day: 0, start: '10:15', end: '10:55', name: 'Математика' },
            { class: '4z', day: 0, start: '11:15', end: '11:55', name: 'Окружающий мир' },
            { class: '4z', day: 0, start: '12:15', end: '12:55', name: 'Родной язык', orange: true },
            
            { class: '4z', day: 1, start: '08:00', end: '08:40', name: 'Музыка', green: true },
            { class: '4z', day: 1, start: '08:50', end: '09:30', name: 'Математика' },

            { class: '4z', day: 1, start: '10:50', end: '11:30', name: 'Литературное чтение' },
            { class: '4z', day: 1, start: '11:50', end: '12:30', name: 'Физическая культура', green: true },
            
            { class: '4z', day: 2, start: '08:00', end: '08:40', name: 'Русский язык' },
            { class: '4z', day: 2, start: '08:50', end: '09:30', name: 'Математика' },
            { class: '4z', day: 2, start: '09:50', end: '10:30', name: 'Литературное чтение' },
            { class: '4z', day: 2, start: '10:50', end: '11:30', name: 'Окружающий мир' },
            
            { class: '4z', day: 3, start: '08:00', end: '08:40', name: 'Русский язык' },
            { class: '4z', day: 3, start: '08:50', end: '09:30', name: 'Математика' },
            { class: '4z', day: 3, start: '09:50', end: '10:30', name: 'Литературное чтение' },
            { class: '4z', day: 3, start: '10:50', end: '11:30', name: 'Физ-ра/Бассейн', green: true },
            { class: '4z', day: 3, start: '11:50', end: '12:30', name: 'Труд (технология)' },
            
            { class: '4z', day: 4, start: '08:00', end: '08:40', name: 'Русский язык' },
            { class: '4z', day: 4, start: '08:50', end: '09:30', name: 'Английский язык', green: true },
            { class: '4z', day: 4, start: '09:50', end: '10:30', name: 'Лит. чтение на родном языке', orange: true },
            { class: '4z', day: 4, start: '10:50', end: '11:30', name: 'Основы светской этики' },

            // 2В класс
            { class: '2v', day: 0, start: '13:10', end: '13:50', name: 'Математика' },
            { class: '2v', day: 0, start: '14:00', end: '14:40', name: 'Русский язык' },
            { class: '2v', day: 0, start: '15:00', end: '15:40', name: 'Литературное чтение' },
            { class: '2v', day: 0, start: '15:50', end: '16:30', name: 'Разговоры о важном' },
            
            { class: '2v', day: 1, start: '13:10', end: '13:50', name: 'Русский язык' },
            { class: '2v', day: 1, start: '14:00', end: '14:40', name: 'Окружающий мир' },
            { class: '2v', day: 1, start: '15:00', end: '15:40', name: 'Музыка', green: true },
            { class: '2v', day: 1, start: '15:50', end: '16:30', name: 'ИЗО', orange: true },
            
            { class: '2v', day: 2, start: '13:10', end: '13:50', name: 'Русский язык' },
            { class: '2v', day: 2, start: '14:00', end: '14:40', name: 'Математика' },
            { class: '2v', day: 2, start: '15:00', end: '15:40', name: 'Физическая культура', green: true },
            { class: '2v', day: 2, start: '15:50', end: '16:30', name: 'Английский язык', green: true },
            
            { class: '2v', day: 3, start: '13:10', end: '13:50', name: 'Математика' },
            { class: '2v', day: 3, start: '14:00', end: '14:40', name: 'Русский язык' },
            { class: '2v', day: 3, start: '15:00', end: '15:40', name: 'Литературное чтение' },
            { class: '2v', day: 3, start: '15:50', end: '16:30', name: 'Труд (технология)' },
            
            { class: '2v', day: 4, start: '13:10', end: '13:50', name: 'Математика' },
            { class: '2v', day: 4, start: '14:00', end: '14:40', name: 'Окружающий мир' },
            { class: '2v', day: 4, start: '15:00', end: '15:40', name: 'Русский язык' },
            { class: '2v', day: 4, start: '15:50', end: '16:30', name: 'Литературное чтение' }
        ];

        const bellsData = [
            { day: 0, times: [
                { s: '08:00', e: '08:25', t: 'Урок 1 (4З)' },
                { s: '08:30', e: '09:10', t: 'Урок 2 (4З)' },
                { s: '13:10', e: '13:50', t: 'Урок 1 (2В)' }
            ]},
            { day: 1, times: [
                { s: '08:00', e: '08:40', t: 'Урок 1' },
                { s: '13:10', e: '13:50', t: 'Урок 1 (2В)' }
            ]},
            // ... дополнительные данные можно добавить сюда
        ];

        let currentFilter = '4z';

        function renderSchedule() {
            const days = [0, 1, 2, 3, 4];
            days.forEach(day => {
                const container = document.getElementById(`lessons-${day}`);
                container.innerHTML = '';
                const dayLessons = scheduleData.filter(l => l.day === day && l.class === currentFilter);
                
                dayLessons.forEach(lesson => {
                    const row = document.createElement('div');
                    row.className = 'event-row';
                    if (lesson.green) row.classList.add('green-lesson');
                    if (lesson.orange) row.classList.add('orange-lesson');
                    
                    row.innerHTML = `
                        <div class="event-main">
                            <div class="event-time">${lesson.start}-${lesson.end}</div>
                            <div class="event-name">
                                <span class="subject-name">${lesson.name}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(row);
                });
                
                document.getElementById(`count-${['monday','tuesday','wednesday','thursday','friday'][day]}`).innerText = dayLessons.length;
            });
        }

        const btn4z = document.getElementById('btn-4z');
        const btn2v = document.getElementById('btn-2v');

        btn4z.addEventListener('click', () => {
            currentFilter = '4z';
            btn4z.classList.add('active');
            btn2v.classList.remove('active');
            renderSchedule();
        });

        btn2v.addEventListener('click', () => {
            currentFilter = '2v';
            btn2v.classList.add('active');
            btn4z.classList.remove('active');
            renderSchedule();
        });

        // Инициализация
        btn4z.classList.add('active');
        renderSchedule();

        // Скрыть лишние элементы для простоты
        document.getElementById('bellButton').addEventListener('click', () => {
            document.getElementById('mainSchedule').style.display = 'none';
            document.getElementById('bellMode').classList.add('visible');
        });

        document.getElementById('backToSchedule').addEventListener('click', () => {
            document.getElementById('mainSchedule').style.display = 'block';
            document.getElementById('bellMode').classList.remove('visible');
        });

    </script>
</body>
</html>
